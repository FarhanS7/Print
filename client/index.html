<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- ── Primary meta ──────────────────────────────────────────────── -->
        <title>Dripify — AI-Powered Custom Fashion Design</title>
        <meta
            name="description"
            content="Turn any idea into custom fashion with AI. Generate unique artwork, design it onto premium products, try it on virtually, and order — all in one place."
        />
        <meta name="theme-color" content="#09090b" />

        <!-- ── Open Graph ────────────────────────────────────────────────── -->
        <meta property="og:type" content="website" />
        <meta
            property="og:title"
            content="Dripify — AI-Powered Custom Fashion Design"
        />
        <meta
            property="og:description"
            content="Generate AI artwork, design on premium products, try on virtually, and order. No design skills needed."
        />
        <meta property="og:image" content="/og-image.png" />

        <!-- ── Twitter Card ──────────────────────────────────────────────── -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta
            name="twitter:title"
            content="Dripify — AI-Powered Custom Fashion Design"
        />
        <meta
            name="twitter:description"
            content="Generate AI artwork, design on premium products, try on virtually, and order."
        />

        <!-- ── Preconnect for Google Fonts ───────────────────────────────── -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

        <!-- ── Google Fonts: Inter (UI) ──────────────────────────────────── -->
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900;1,14..32,400&display=swap"
            rel="stylesheet"
        />

        <!-- ── Inline critical styles ─────────────────────────────────────── -->
        <style>
            /* Prevent flash of unstyled content */
            html {
                background-color: #09090b;
                color-scheme: dark;
            }

            body {
                margin: 0;
                padding: 0;
                font-family:
                    "Inter",
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    Roboto,
                    Helvetica,
                    Arial,
                    sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                background-color: #09090b;
                color: #fafafa;
            }

            /* Thin scrollbar */
            html {
                scrollbar-width: thin;
                scrollbar-color: #27272a transparent;
            }

            ::-webkit-scrollbar {
                width: 5px;
            }

            ::-webkit-scrollbar-track {
                background: transparent;
            }

            ::-webkit-scrollbar-thumb {
                background-color: #27272a;
                border-radius: 99px;
            }

            /* Loading state — shown until React mounts */
            #root:empty::before {
                content: "";
                position: fixed;
                inset: 0;
                background: #09090b;
                z-index: 9999;
            }
        </style>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
